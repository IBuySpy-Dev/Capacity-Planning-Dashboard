name: Setup Azure Deployment Infrastructure

# Sync GitHub repository vars from existing Azure resources.
# Run this after IaC deployment to push SQL_SERVER_NAME, SQL_DATABASE_NAME,
# and AZURE_WEBAPP_NAME so CI/CD workflows can connect to Azure resources.

on:
  workflow_dispatch:
    inputs:
      azure_resource_group:
        description: 'Azure Resource Group (e.g. rg-capdash-prod)'
        required: true
        default: 'rg-capdash-prod'

jobs:
  sync-resource-vars:
    name: Sync Resource Vars from Azure
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Login to Azure (OIDC)
        # OIDC login — no long-lived credential stored anywhere.
        # Legacy credentials secret must NOT be used (security policy).
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Discover and push Azure resource vars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESOURCE_GROUP: ${{ github.event.inputs.azure_resource_group }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          echo "🔍 Querying resource group: $RESOURCE_GROUP"

          WEBAPP_NAME=$(az webapp list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[0].name" -o tsv 2>/dev/null || true)

          SQL_SERVER=$(az sql server list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[0].name" -o tsv 2>/dev/null || true)

          if [[ -n "$SQL_SERVER" ]]; then
            SQL_DATABASE=$(az sql db list \
              --resource-group "$RESOURCE_GROUP" \
              --server "$SQL_SERVER" \
              --query "[?name!='master'].name | [0]" -o tsv 2>/dev/null || true)
          else
            SQL_DATABASE=""
          fi

          echo ""
          echo "📦 Discovered resources:"
          echo "  Web App:     ${WEBAPP_NAME:-<not found>}"
          echo "  SQL Server:  ${SQL_SERVER:-<not found>}"
          echo "  SQL Database:${SQL_DATABASE:-<not found>}"
          echo ""

          VARS_SET=0

          if [[ -n "$WEBAPP_NAME" ]]; then
            gh variable set AZURE_WEBAPP_NAME --body "$WEBAPP_NAME" --repo "$REPO"
            echo "✅ AZURE_WEBAPP_NAME = $WEBAPP_NAME"
            VARS_SET=$((VARS_SET+1))
          else
            echo "⚠️  No web app found — AZURE_WEBAPP_NAME not updated"
          fi

          if [[ -n "$SQL_SERVER" ]]; then
            gh variable set SQL_SERVER_NAME --body "$SQL_SERVER" --repo "$REPO"
            echo "✅ SQL_SERVER_NAME = $SQL_SERVER"
            VARS_SET=$((VARS_SET+1))
          else
            echo "⚠️  No SQL server found — SQL_SERVER_NAME not updated"
          fi

          if [[ -n "$SQL_DATABASE" ]]; then
            gh variable set SQL_DATABASE_NAME --body "$SQL_DATABASE" --repo "$REPO"
            echo "✅ SQL_DATABASE_NAME = $SQL_DATABASE"
            VARS_SET=$((VARS_SET+1))
          else
            echo "⚠️  No SQL database found — SQL_DATABASE_NAME not updated"
          fi

          echo ""
          echo "✅ $VARS_SET/3 resource vars synced."
          [[ $VARS_SET -ge 2 ]] || { echo "❌ Too few vars set — check resource group name"; exit 1; }

      - name: Verify repo vars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "📋 Current repository variables:"
          gh variable list --repo "${{ github.repository }}"
