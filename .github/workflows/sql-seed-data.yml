name: SQL Seed Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm applying seed data'
        required: true
        default: ''

# CRITICAL: never cancel an in-flight DB deployment.
# See docs/guardrails/db-deployment-concurrency.md
concurrency:
  group: sql-seed-data
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  SQL_SERVER: ${{ vars.SQL_SERVER_NAME }}
  SQL_DATABASE: ${{ vars.SQL_DATABASE_NAME }}

jobs:
  seed-data:
    name: Apply Seed Data
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm == 'yes' }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Add runner IP to SQL firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Adding $RUNNER_IP to SQL firewall..."
          az sql server firewall-rule create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ env.SQL_SERVER }}" \
            --name "github-actions-runner-${{ github.run_id }}" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      - name: Get Azure SQL access token
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource https://database.windows.net/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Apply DashboardSetting defaults (idempotent MERGE)
        run: |
          sqlcmd \
            -S "${{ env.SQL_SERVER }}.database.windows.net" \
            -d "${{ env.SQL_DATABASE }}" \
            --authentication-method=ActiveDirectoryManagedIdentity \
            -i sql/seed/settings.sql

      - name: Remove runner IP from SQL firewall
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ env.SQL_SERVER }}" \
            --name "github-actions-runner-${{ github.run_id }}" \
            --yes 2>/dev/null || true
