name: Setup GitHub Actions Secrets

on:
  workflow_dispatch:
    inputs:
      azure_subscription_id:
        description: 'Azure Subscription ID'
        required: true
      azure_resource_group:
        description: 'Azure Resource Group name'
        required: true
      azure_webapp_name:
        description: 'Azure App Service name'
        required: true

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate inputs
        shell: pwsh
        run: |
          Write-Host "Validating setup inputs..." -ForegroundColor Cyan
          
          $subscriptionId = "${{ github.event.inputs.azure_subscription_id }}"
          $resourceGroup = "${{ github.event.inputs.azure_resource_group }}"
          $appName = "${{ github.event.inputs.azure_webapp_name }}"
          
          if ([string]::IsNullOrEmpty($subscriptionId)) {
            Write-Host "ERROR: AZURE_SUBSCRIPTION_ID is required" -ForegroundColor Red
            exit 1
          }
          if ([string]::IsNullOrEmpty($resourceGroup)) {
            Write-Host "ERROR: AZURE_RESOURCE_GROUP is required" -ForegroundColor Red
            exit 1
          }
          if ([string]::IsNullOrEmpty($appName)) {
            Write-Host "ERROR: AZURE_WEBAPP_NAME is required" -ForegroundColor Red
            exit 1
          }
          
          Write-Host "✓ All inputs provided" -ForegroundColor Green
          Write-Host "  Subscription: $subscriptionId"
          Write-Host "  Resource Group: $resourceGroup"
          Write-Host "  App Name: $appName"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: false
        continue-on-error: true
        id: azure_login

      - name: Create Service Principal (if not already exists)
        shell: pwsh
        if: steps.azure_login.outcome == 'failure'
        run: |
          Write-Host "Azure credentials not yet configured. Would need manual setup." -ForegroundColor Yellow
          Write-Host "For automated setup, ensure AZURE_CREDENTIALS is already configured." -ForegroundColor Yellow
          exit 1

      - name: Verify Azure Access
        if: steps.azure_login.outcome == 'success'
        run: |
          echo "Azure authentication successful"
          az account show --query "{ subscription: id, tenant: tenantId }"

      - name: Set GitHub Actions Secrets
        if: steps.azure_login.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBSCRIPTION_ID: ${{ github.event.inputs.azure_subscription_id }}
          RESOURCE_GROUP: ${{ github.event.inputs.azure_resource_group }}
          WEBAPP_NAME: ${{ github.event.inputs.azure_webapp_name }}
        run: |
          set -e
          
          echo "Setting GitHub Actions secrets..."
          
          # Set AZURE_SUBSCRIPTION_ID
          gh secret set AZURE_SUBSCRIPTION_ID --body "$SUBSCRIPTION_ID" --repo "${{ github.repository }}"
          echo "✓ Set AZURE_SUBSCRIPTION_ID"
          
          # Set AZURE_RESOURCE_GROUP
          gh secret set AZURE_RESOURCE_GROUP --body "$RESOURCE_GROUP" --repo "${{ github.repository }}"
          echo "✓ Set AZURE_RESOURCE_GROUP"
          
          # Set AZURE_WEBAPP_NAME
          gh secret set AZURE_WEBAPP_NAME --body "$WEBAPP_NAME" --repo "${{ github.repository }}"
          echo "✓ Set AZURE_WEBAPP_NAME"
          
          # AZURE_CREDENTIALS must already exist or be provided separately
          # Verify it exists
          CREDS=$(gh secret list --repo "${{ github.repository }}" | grep -c AZURE_CREDENTIALS || echo "0")
          if [ "$CREDS" -gt "0" ]; then
            echo "✓ AZURE_CREDENTIALS already configured"
          else
            echo "⚠ AZURE_CREDENTIALS not found - must be set manually"
            echo "  Set this secret with service principal credentials from:"
            echo "  az ad sp create-for-rbac --name github-deployment-sp"
            exit 1
          fi

      - name: Verify Secrets Configuration
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Verifying secrets configuration..."
          echo ""
          gh secret list --repo "${{ github.repository }}" | grep -E "AZURE_|GITHUB_TOKEN" || true
          echo ""
          echo "✓ Secrets configured successfully"

      - name: Ready for Deployment
        run: |
          echo "✅ GitHub Actions setup complete"
          echo ""
          echo "Next: Trigger the deployment workflow"
          echo "  gh workflow run deploy.yml"
          echo ""
          echo "Or visit: https://github.com/${{ github.repository }}/actions/workflows/deploy.yml"
