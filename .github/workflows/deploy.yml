name: Deploy Capacity Dashboard

# Triggers: push to main (automatic) or manual via workflow_dispatch.
#
# Required GitHub Variables (non-secret — safe to store as vars):
#   AZURE_CLIENT_ID       — Service principal app (client) ID for OIDC
#   AZURE_TENANT_ID       — Entra tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription GUID
#
# Required GitHub Secrets (sensitive resource identifiers):
#   AZURE_WEBAPP_NAME     — App Service name (e.g. app-capdash-prod-prod01)
#   AZURE_RESOURCE_GROUP  — Resource group (e.g. rg-capdash-prod)
#
# AZURE_CLIENT_SECRET must NEVER be stored — OIDC only (policy requirement).

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

# cancel-in-progress: false — MANDATORY because this workflow runs DB migrations.
# Cancelling a workflow mid-migration can leave the database in a partially
# applied state. All concurrent deploys queue behind the running one instead.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  # ── Job 1: Validate ──────────────────────────────────────────────────────────
  # Runs for all triggers. Fails fast before any cloud interaction.
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Node.js built-in test runner (node --test). No compile step needed.
        run: npm test

  # ── Job 2: Deploy ─────────────────────────────────────────────────────────────
  # Runs only after tests pass. Handles both push and workflow_dispatch triggers.
  # Skips gracefully when AZURE_WEBAPP_NAME is not set (infra not yet provisioned).
  deploy:
    name: Deploy to Azure
    needs: build-and-test
    if: ${{ vars.AZURE_WEBAPP_NAME != '' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write   # Required for OIDC — do NOT remove or weaken
    steps:
      - name: Preflight — verify required vars
        run: |
          missing=()
          [ -z "${{ vars.AZURE_CLIENT_ID }}" ]       && missing+=("AZURE_CLIENT_ID")
          [ -z "${{ vars.AZURE_TENANT_ID }}" ]       && missing+=("AZURE_TENANT_ID")
          [ -z "${{ vars.AZURE_SUBSCRIPTION_ID }}" ] && missing+=("AZURE_SUBSCRIPTION_ID")
          [ -z "${{ vars.AZURE_RESOURCE_GROUP }}" ]  && missing+=("AZURE_RESOURCE_GROUP")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required GitHub vars: ${missing[*]}"
            echo "Run bootstrap (setup-infrastructure.yml) or bicep-deploy.yml to populate these."
            exit 1
          fi
          echo "✓ All required vars present"

      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC login — no long-lived credential stored anywhere.
      # azure/login@v2 is required by security policy; do not upgrade to v3+
      # without updating the federated credential configuration in Entra.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install production dependencies
        # --omit=dev excludes devDependencies from node_modules in the package.
        run: npm ci --omit=dev

      - name: Verify critical deployment assets
        # tools/ PowerShell scripts are loaded at runtime by the app.
        # Abort deploy now if they are missing rather than fail silently in prod.
        shell: pwsh
        run: |
          $required = @(
            'tools/Get-AzVMAvailability/Get-AzVMAvailability.ps1',
            'tools/Get-AzPaaSAvailability/Get-AzPaaSAvailability.ps1'
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              Write-Host "FATAL: Required asset missing: $path" -ForegroundColor Red
              exit 1
            }
          }
          Write-Host "✓ All critical assets present" -ForegroundColor Green

      - name: Create deployment package
        # File manifest mirrors deploy-web-app.ps1 — keep in sync with that script.
        run: |
          mkdir -p deployment

          # Individual root files
          for f in app.js index.html server.js web.config styles.css sku-catalog.js \
                   package.json package-lock.json; do
            [ -f "$f" ] && cp "$f" deployment/ || echo "WARN: $f not found, skipping"
          done

          # Directories (sql/ and scripts/ carry migrations and helper scripts)
          for d in src sql scripts tools react; do
            [ -d "$d" ] && cp -r "$d" deployment/ || echo "WARN: $d/ not found, skipping"
          done

          # Production node_modules (installed above with --omit=dev)
          cp -r node_modules deployment/

          cd deployment
          zip -r ../deploy.zip .
          echo "✓ Package created ($(du -sh ../deploy.zip | cut -f1))"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --src-path ./deploy.zip \
            --type zip \
            --async false

      # ── SQL steps ─────────────────────────────────────────────────────────────
      # go-sqlcmd supports ActiveDirectoryDefault — uses the OIDC-acquired
      # Azure CLI credentials from the azure/login step above.
      - name: Install sqlcmd
        run: |
          RELEASE_JSON=$(curl -sSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/microsoft/go-sqlcmd/releases/latest)
          VERSION=$(echo "$RELEASE_JSON" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tag_name'])" 2>/dev/null \
            || echo "v1.8.2")
          curl -sSL "https://github.com/microsoft/go-sqlcmd/releases/download/${VERSION}/sqlcmd-linux-amd64.tar.bz2" \
            | sudo tar -xj -C /usr/local/bin sqlcmd
          sqlcmd --version

      - name: Open SQL firewall for runner
        # Temporarily allows the GitHub Actions runner IP through the SQL firewall.
        # Closed again in the always() step below regardless of success or failure.
        run: |
          APP="${{ env.AZURE_WEBAPP_NAME }}"
          ENV_PART=$(echo "$APP" | cut -d'-' -f3)
          SUFFIX=$(echo "$APP" | cut -d'-' -f4)
          SQL_SERVER="sql-capdash-${ENV_PART}-${SUFFIX}"
          echo "SQL_SERVER=$SQL_SERVER" >> "$GITHUB_ENV"

          RUNNER_IP=$(curl -sSL https://api.ipify.org)
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"

          az sql server update \
            --name "$SQL_SERVER" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --set publicNetworkAccess=Enabled \
            --output none
          az sql server firewall-rule create \
            --name github-actions-temp \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --server "$SQL_SERVER" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP" \
            --output none
          echo "✓ SQL firewall opened for $RUNNER_IP"

      - name: Bootstrap SQL managed identity
        shell: pwsh
        run: |
          $appName = "${{ env.AZURE_WEBAPP_NAME }}"
          $parts   = $appName -split '-'
          $environment    = $parts[2]
          $workloadSuffix = $parts[3]

          $sqlServerName   = "sql-capdash-$environment-$workloadSuffix"
          $sqlDatabaseName = "sqldb-capdash-$environment"

          Write-Host "SQL Server:   $sqlServerName"
          Write-Host "SQL Database: $sqlDatabaseName"

          & ./scripts/bootstrap-sql-managed-identity.ps1 `
            -AppServiceName   "${{ env.AZURE_WEBAPP_NAME }}" `
            -SqlServerName    $sqlServerName `
            -SqlDatabaseName  $sqlDatabaseName `
            -ResourceGroup    "${{ env.AZURE_RESOURCE_GROUP }}" `
            -SubscriptionId   "${{ vars.AZURE_SUBSCRIPTION_ID }}"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: SQL bootstrap failed (exit $LASTEXITCODE)" -ForegroundColor Red
            exit 1
          }
          Write-Host "✓ SQL bootstrap complete" -ForegroundColor Green

      # DB migration step — the cancel-in-progress: false concurrency guard above
      # ensures this step is never interrupted mid-run. Migrations in sql/migrations/
      # are applied in filename order. Each file must be idempotent (IF NOT EXISTS /
      # BEGIN TRAN ... ROLLBACK pattern) so re-runs on retry are safe.
      - name: Apply pending SQL migrations
        shell: pwsh
        run: |
          $appName = "${{ env.AZURE_WEBAPP_NAME }}"
          $parts   = $appName -split '-'
          $environment    = $parts[2]
          $workloadSuffix = $parts[3]

          $sqlServer   = "sql-capdash-${environment}-${workloadSuffix}.database.windows.net"
          $sqlDatabase = "sqldb-capdash-$environment"

          $migrations = Get-ChildItem -Path "sql/migrations" -Filter "*.sql" |
                        Sort-Object Name

          Write-Host "Found $($migrations.Count) migration file(s) in sql/migrations/"

          foreach ($migration in $migrations) {
            Write-Host "→ Applying: $($migration.Name)"
            & ./scripts/apply-migration.ps1 `
              -SqlServer    $sqlServer `
              -SqlDatabase  $sqlDatabase `
              -MigrationFile $migration.FullName `
              -UseEntra
            if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: Migration failed: $($migration.Name)" -ForegroundColor Red
              exit 1
            }
          }
          Write-Host "✓ All migrations applied successfully" -ForegroundColor Green

      - name: Close SQL firewall
        # Runs even if preceding steps failed — ensures firewall is never left open.
        if: always()
        run: |
          APP="${{ env.AZURE_WEBAPP_NAME }}"
          ENV_PART=$(echo "$APP" | cut -d'-' -f3)
          SUFFIX=$(echo "$APP" | cut -d'-' -f4)
          SQL_SERVER="sql-capdash-${ENV_PART}-${SUFFIX}"

          az sql server firewall-rule delete \
            --name github-actions-temp \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --server "$SQL_SERVER" \
            --output none 2>/dev/null || true
          az sql server update \
            --name "$SQL_SERVER" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --set publicNetworkAccess=Disabled \
            --output none
          echo "✓ SQL firewall closed"

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}"
          echo "✓ App restarted"

      - name: Wait for App Service to be ready
        shell: pwsh
        run: |
          $healthUrl   = "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/healthz"
          $maxAttempts = 30
          $attempt     = 0
          Write-Host "Polling $healthUrl ..."
          while ($attempt -lt $maxAttempts) {
            try {
              $response = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing `
                            -ErrorAction Stop -MaximumRedirection 0
              Write-Host "App is responsive (HTTP $($response.StatusCode))" -ForegroundColor Green
              exit 0
            } catch {
              $status = $_.Exception.Response.StatusCode.value__
              if ($status -ge 200 -and $status -lt 500) {
                Write-Host "App is responsive (HTTP $status)" -ForegroundColor Green
                exit 0
              }
              $attempt++
              Write-Host "Attempt $attempt/$maxAttempts — retrying in 5 s..."
              Start-Sleep -Seconds 5
            }
          }
          Write-Host "ERROR: App did not respond after $maxAttempts attempts" -ForegroundColor Red
          exit 1

      - name: Discover Entra Client ID from App Service
        id: entra-discovery
        run: |
          CLIENT_ID=$(az webapp config appsettings list \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "[?name=='ENTRA_CLIENT_ID'].value | [0]" -o tsv)
          if [ -z "$CLIENT_ID" ]; then
            echo "::warning::ENTRA_CLIENT_ID not configured — skipping auth smoke test"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Acquire Bearer token for auth smoke test
        if: steps.entra-discovery.outputs.skip != 'true'
        id: get-token
        run: |
          TOKEN=$(az account get-access-token \
            --resource "api://${{ steps.entra-discovery.outputs.client_id }}" \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Authenticated API smoke test
        if: steps.entra-discovery.outputs.skip != 'true'
        continue-on-error: false
        run: |
          WEBAPP_URL="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            "$WEBAPP_URL/api/admin/config")
          echo "Auth smoke test returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Auth smoke test failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✓ Authenticated API smoke test passed"

      - name: Deployment summary
        run: |
          echo "✅ Deployment complete"
          echo "App URL : https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "Trigger : ${{ github.event_name }}"
          echo "Ref     : ${{ github.ref }} @ ${{ github.sha }}"
          echo "Env     : ${{ github.event.inputs.environment || 'prod' }}"
