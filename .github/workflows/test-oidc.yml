name: Test GitHub OIDC Token

on:
  workflow_dispatch:

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Get OIDC Token
        run: |
          # Request the OIDC token from GitHub
          echo "Requesting OIDC token..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/app/installations/${{ github.installation_id }}/access_tokens" \
            -d "{\"repositories\":[\"${{ github.event.repository.name }}\"]}")
          
          echo "Response: $RESPONSE"
          
          # Try using the GitHub CLI to get the token instead
          echo ""
          echo "Using GitHub CLI to request OIDC token..."
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --jq '.head_branch'
          
      - name: Test Azure Login with Direct API Call
        run: |
          echo "Testing direct Azure AD token exchange..."
          echo "Client ID: ${{ vars.AZURE_CLIENT_ID }}"
          echo "Tenant ID: ${{ vars.AZURE_TENANT_ID }}"
          
          # Try a simple login test
          az account show 2>&1 || true

